name: Keep Render Alive

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          curl -sS --max-time 15 -o /dev/null -w "%{http_code}" https://horse-jockey-challenge-2.onrender.com/
