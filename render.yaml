services:
  - type: web
    name: jockey-driver-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: PUNTERSEDGE_API_KEY
        value: e68af6ab-99f6-4d1f-8a19-8d2c1c80360a
